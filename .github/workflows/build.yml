# A simple action usage
name: Build Kernel
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/realme-kernel-opensource/realme_C51_C53_Narzo-N53-AndroidT-kernel-source
          # kernel-dir: msm-4.19
          kernel-branch: main
          config: ums512_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          ksu: true
          ksu-url: https://github.com/rifsxd/KernelSU-Next
          ksu-version: main
          android-version: 15
          aosp-clang-version: r450784d
          disable-lto: true
          anykernel3: true
